<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff7a00" />
  <meta name="description" content="Pudser Support Hub som installérbar app til tablet og mobil." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Pudser Support Hub</title>
  <style>
    :root{
      --bg:#0f1115;--panel:#161920;--muted:#2a2f3a;--text:#e8ecf1;--sub:#aab3c2;
      --accent:#ff7a00;--ok:#19c37d;--warn:#ffcc00;--bad:#ff4d4f
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,'Helvetica Neue',Arial,'Noto Sans';
      background:var(--bg);
      color:var(--text)
    }
    header{
      position:sticky;top:0;z-index:10;
      background:linear-gradient(180deg, rgba(15,17,21,.95), rgba(15,17,21,.7));
      backdrop-filter:blur(8px);
      border-bottom:1px solid #222;
      padding:12px 18px;
      display:flex;gap:12px;align-items:center;justify-content:space-between
    }
    .header-left{display:flex;align-items:center;gap:10px}
    header h1{font-size:18px;margin:0;font-weight:700}
    header .badge{font-size:11px;color:#111;background:var(--accent);padding:3px 8px;border-radius:999px}
    .wrap{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
      max-width:1200px;
      margin:0 auto;
      padding:16px 16px 72px
    }
    @media (max-width:980px){.wrap{grid-template-columns:1fr}}
    aside{
      background:var(--panel);
      border:1px solid #202532;border-radius:14px;padding:14px;
      max-height:calc(100vh - 120px);overflow:auto
    }
    main{
      background:var(--panel);border:1px solid #202532;border-radius:14px;min-height:60vh
    }
    .search{display:flex;gap:8px}
    .search input{
      flex:1;background:#0c0f14;color:var(--text);border:1px solid #222937;border-radius:10px;padding:10px 12px
    }
    .search kbd{
      background:#0c0f14;border:1px solid #222937;border-radius:6px;padding:3px 6px;font-size:12px;color:var(--sub)
    }
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 6px}
    .chip{
      border:1px solid #2b3240;background:#10141b;color:var(--sub);padding:6px 10px;border-radius:999px;
      font-size:12px;cursor:pointer
    }
    .chip.active{background:var(--accent);color:#111;border-color:var(--accent)}
    .section-title{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.12em;margin:12px 4px 8px}
    .list{display:flex;flex-direction:column;gap:8px}
    .card{border:1px solid #222937;background:#0e1218;border-radius:12px;padding:12px;cursor:pointer}
    .card:hover{border-color:#2f3a4e}
    .card h3{margin:0 0 4px;font-size:14px}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .tag{font-size:11px;color:#111;background:#9fb3ff;padding:2px 8px;border-radius:999px}
    .tag.orange{background:var(--accent)}
    .tag.gray{background:#8b95a5}
    .content{padding:18px 18px 28px}
    .titlebar{
      display:flex;align-items:center;gap:10px;justify-content:space-between;border-bottom:1px solid #202532;padding:14px 18px
    }
    .titlebar h2{margin:0;font-size:18px}
    .btn{
      background:#0c0f14;border:1px solid #222937;color:var(--text);padding:8px 10px;border-radius:10px;font-size:13px;cursor:pointer
    }
    .btn:hover{border-color:#2f3a4e}
    .btn.accent{background:var(--accent);border-color:var(--accent);color:#111;font-weight:700}
    details{border:1px solid #232938;background:#0c1016;border-radius:12px;margin:10px 0}
    summary{cursor:pointer;list-style:none;padding:12px 14px}
    summary::-webkit-details-marker{display:none}
    .step{border-top:1px solid #1d222c;padding:12px 14px;line-height:1.4}
    .note{border-left:3px solid var(--ok);padding:8px 10px;background:#0d1412;border-radius:8px}
    .warn{border-left:3px solid var(--warn);padding:8px 10px;background:#141307;border-radius:8px}
    .danger{border-left:3px solid var(--bad);padding:8px 10px;background:#190e10;border-radius:8px}
    code,pre{
      background:#0a0d12;border:1px solid #1d2230;border-radius:8px;padding:3px 6px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,Monaco,"Courier New";font-size:12px
    }
    pre{padding:10px;overflow:auto}
    .empty{color:var(--sub);padding:16px}
    .hidden{display:none}
    footer{
      position:fixed;bottom:0;left:0;width:100%;background:#0c0f14;color:#aab3c2;text-align:center;
      padding:6px 0;font-size:12px;border-top:1px solid #222937;z-index:20
    }
    @media print{
      header,aside,footer{display:none}
      .wrap{display:block;padding:0}
      main{border:none}
      body{background:#fff;color:#000}
      .content{padding:0}
      a{color:#000}
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Pudser Support Hub</h1>
      <span class="badge">PWA</span>
    </div>
    <button class="btn accent hidden" id="installBtn">Installér app</button>
  </header>

  <div class="wrap">
    <aside>
      <div class="search">
        <input id="q" type="search" placeholder="Søg…" autocomplete="off" />
        <kbd>/</kbd>
      </div>
      <div class="chips" id="chips"></div>
      <div class="section-title">Guides</div>
      <div class="list" id="list"></div>
      <div class="empty hidden" id="empty">Ingen resultater.</div>
    </aside>

    <main>
      <div class="titlebar">
        <h2 id="view-title">Vælg en guide</h2>
      </div>
      <div class="content" id="view"></div>
    </main>
  </div>

  <footer>© 2026 MV Polering – Alle rettigheder forbeholdes</footer>

  <script>
    const RAW_GUIDES = [
      {
        id: 'printer-tilslutning',
        title: 'Tilføj printer til tablet og app',
        category: 'Printer',
        tags: ['Printer', 'Bluetooth'],
        steps: [
          { type: 'text', body: 'Slide top panel ned og tilgå bluetooth-indstillinger ved at holde fingeren inde på bluetooth-ikonet.' },
          { type: 'warn', body: 'Er der allerede en eller flere printere tilknyttet, så tryk på tandhjulet ud for printerens navn (TM-P20II_xxxxxx) og ophæv parring.' },
          { type: 'note', body: 'Tænd for din printer.' },
          { type: 'text', body: 'Åbn printeren, som hvis du skulle skifte bonrulle.' },
          { type: 'text', body: 'Tryk nu én enkelt gang på "Feed"-knappen, som er til højre for tænd/sluk-knappen. Så skulle du høre en biplyd.' },
          { type: 'warn', body: 'Luk printeren og sørg for, at papiret ikke er i klemme.' },
          { type: 'text', body: 'Nu skal du trykke 2 gange på "Feed"-knappen. Først én gang kort, og derefter én gang hvor du holder den inde.' },
          { type: 'note', body: 'Har du gjort det rigtigt, printes der en bon med bluetooth-oplysninger.' },
          { type: 'text', body: 'Nu er printeren klar, så gå ind i bluetooth-indstillingerne på din tablet og find printeren.' },
          { type: 'note', body: 'Printerens navn er altid TM-P20II_ efterfulgt af numre.' },
          { type: 'text', body: 'Tryk nu på printerens navn og par enheden.' },
          { type: 'text', body: 'Åbn nu MV Polering-appen, gå ind i indstillinger, og scroll ned til du ser "Printere".' },
          { type: 'text', body: 'Søg efter printeren og vælg den.' },
          { type: 'note', body: 'Din printer er nu tilknyttet. Husk at lave et testprint, så du sikrer dig, at det virker.' }
        ]
      },
      {
        id: 'app-crash',
        title: 'Appen fryser eller lukker ned',
        category: 'Tablet',
        tags: ['Tablet', 'App'],
        steps: [
          { type: 'text', body: 'Luk appen helt og åbn den igen.' },
          { type: 'text', body: 'Genstart tabletten, hvis problemet fortsætter.' },
          { type: 'warn', body: 'Hvis det sker ofte, kontakt support.' }
        ]
      },
      {
        id: 'printer-advarsel',
        title: 'Gult udråbstegn på printer og vil ikke printe',
        category: 'Printer',
        tags: ['Advarsel', 'Udråbstegn', 'Fejl'],
        steps: [
          { type: 'note', body: 'Start med at slukke din printer.' },
          { type: 'text', body: 'Åbn printeren og fjern bonrullen.' },
          { type: 'text', body: 'Tjek for papirstop eller fremmedlegemer i printeren.' },
          { type: 'text', body: 'Sæt bonrullen i igen og luk printeren.' },
          { type: 'text', body: 'Tænd printeren og prøv at printe en testbon.' },
          { type: 'warn', body: 'Hvis det ikke virker, så sluk printeren.' },
          { type: 'text', body: 'Vend den rundt og tag batteriet ud.' },
          { type: 'text', body: 'Sæt batteriet i igen, tænd printeren og print en testbon.' },
          { type: 'danger', body: 'Hvis problemet fortsætter, kontakt IT-support.' }
        ]
      },
      {
        id: 'ugearbejde-forsvundet',
        title: 'Ugearbejde og notater forsvundet fra app',
        category: 'App',
        tags: ['Ugearbejde', 'Kunder'],
        steps: [
          { type: 'note', body: 'Tag det roligt. Umiddelbart er det ikke væk for altid.' },
          { type: 'text', body: 'Start med at åbne din mail, find filen med dit ugearbejde og indlæs den.' },
          { type: 'text', body: 'Hvis det ikke virker, så prøv at genstarte appen og indlæs filen igen.' },
          { type: 'text', body: 'Hvis det stadig ikke virker, så tjek i Google Play om der ligger en opdatering til appen.' },
          { type: 'warn', body: 'Hvis problemet fortsætter, kontakt support for yderligere hjælp.' }
        ]
      },
      {
        id: 'printer-halv-note',
        title: 'Printer udskriver kun delvist eller går i stå',
        category: 'Printer',
        tags: ['Printer', 'Enhed'],
        steps: [
          { type: 'text', body: 'Åbn printeren og tag bonrullen ud.' },
          { type: 'text', body: 'Med en tør klud, puds forsigtigt det lille "spejl", som er placeret lige nede foran hvor knapperne sidder.' },
          { type: 'text', body: 'Sæt bonrullen i og luk printeren. Tjek derefter om det virker.' },
          { type: 'text', body: 'Hvis det ikke virker, så vend printeren rundt og klik batteriet ud.' },
          { type: 'text', body: 'Sæt batteriet i igen og tænd printeren.' },
          { type: 'note', body: 'Test herefter om det virker.' },
          { type: 'warn', body: 'Hvis det stadig ikke virker, så sørg for at printeren kan ligge varmt et stykke tid, da kulde godt kan gøre, at den ikke kan printe korrekt.' },
          { type: 'danger', body: 'Virker det stadig ikke? Så er printeren muligvis defekt. Kontakt IT-support.' }
        ]
      },
      {
        id: 'bonblank',
        title: 'Printer udskriver blank bon',
        category: 'Printer',
        tags: ['Printer', 'Papir'],
        steps: [
          { type: 'text', body: 'Vend papirrullen. Den blanke side skal være opad.' },
          { type: 'note', body: 'Du kan teste papiret ved at ridse det let. Den rigtige side tager imod ridser, det gør den forkerte normalt ikke.' }
        ]
      }
    ];

    function normalizeCategory(category = '') {
      const key = category.trim().toLowerCase();
      const map = {
        printer: 'Printer',
        tablet: 'Tablet',
        app: 'App'
      };
      return map[key] || (key ? key.charAt(0).toUpperCase() + key.slice(1) : 'Andet');
    }

    function normalizeTag(tag = '') {
      const cleaned = tag.trim();
      if (!cleaned) return '';
      return cleaned.charAt(0).toUpperCase() + cleaned.slice(1).toLowerCase();
    }

    function uniqueCaseInsensitive(values) {
      const seen = new Set();
      return values.filter(value => {
        const key = value.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    const GUIDES = RAW_GUIDES.map(guide => ({
      ...guide,
      category: normalizeCategory(guide.category),
      tags: uniqueCaseInsensitive((guide.tags || []).map(normalizeTag)).filter(Boolean)
    }));

    const state = { query: '', category: 'Alle', active: null };
    const el = s => document.querySelector(s);
    const list = el('#list');
    const chips = el('#chips');
    const q = el('#q');
    const view = el('#view');
    const viewTitle = el('#view-title');
    const empty = el('#empty');
    const installBtn = el('#installBtn');

    const categories = ['Alle', ...Array.from(new Set(GUIDES.map(g => g.category)))];

    function renderChips() {
      chips.innerHTML = '';
      categories.forEach(cat => {
        const button = document.createElement('button');
        button.className = 'chip' + (state.category === cat ? ' active' : '');
        button.textContent = cat;
        button.onclick = () => {
          state.category = cat;
          renderChips();
          renderList();
        };
        chips.appendChild(button);
      });
    }

    function match(guide) {
      const haystack = [
        guide.title,
        guide.category,
        guide.tags.join(' '),
        guide.steps.map(step => step.body).join(' ')
      ].join(' ').toLowerCase();

      const queryOk = !state.query || haystack.includes(state.query.toLowerCase());
      const categoryOk = state.category === 'Alle' || guide.category === state.category;
      return queryOk && categoryOk;
    }

    function renderList() {
      const items = GUIDES.filter(match);
      list.innerHTML = '';
      items.length === 0 ? empty.classList.remove('hidden') : empty.classList.add('hidden');

      items.forEach(guide => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${guide.title}</h3>
          <div class="meta">
            <span class="tag orange">${guide.category}</span>
            ${guide.tags.map(tag => `<span class="tag gray">${tag}</span>`).join('')}
          </div>
        `;
        card.onclick = () => openGuide(guide.id);
        list.appendChild(card);
      });
    }

    function openGuide(id) {
      const guide = GUIDES.find(item => item.id === id);
      if (!guide) return;

      state.active = id;
      viewTitle.textContent = guide.title;
      location.hash = id;

      view.innerHTML = guide.steps.map((step, index) => {
        const cls =
          step.type === 'note' ? 'note' :
          step.type === 'warn' ? 'warn' :
          step.type === 'danger' ? 'danger' : '';

        return `
          <details open>
            <summary><strong>Trin ${index + 1}</strong></summary>
            <div class="step ${cls}">${step.body}</div>
          </details>
        `;
      }).join('');
    }

    function openFromHash() {
      const id = decodeURIComponent(location.hash.replace('#', ''));
      if (!id) return;
      const exists = GUIDES.some(guide => guide.id === id);
      if (exists) openGuide(id);
    }

    q.addEventListener('input', () => {
      state.query = q.value.trim();
      renderList();
    });

    window.addEventListener('keydown', event => {
      if (event.key === '/' && document.activeElement !== q) {
        event.preventDefault();
        q.focus();
      }
    });

    window.addEventListener('hashchange', openFromHash);

    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }

    renderChips();
    renderList();
    openFromHash();

    if (!location.hash && GUIDES.length) {
      openGuide(GUIDES[0].id);
    }
  </script>
</body>
</html>
